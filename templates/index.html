<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер закладок</title>
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }

        /* Кастомный скролл */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1e2937;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, rgb(139 92 246), rgb(167 139 250));
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(135deg, rgb(167 139 250), rgb(139 92 246));
        }
        * {
            scrollbar-width: thin;
            scrollbar-color: rgb(139 92 246) #1e2937;
        }

        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .tab-active {
            background: linear-gradient(90deg, rgb(139 92 246), rgb(167 139 250));
            color: white;
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
        }

        .card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.5);
        }

        .neon-text {
            text-shadow: 0 0 10px rgb(167 139 250), 0 0 20px rgb(167 139 250);
        }

        .modal {
            animation: modalPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes modalPop {
            0% { transform: scale(0.7); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .card-img {
            width: 48px;
            height: 48px;
            object-fit: contain;
            border-radius: 10px;
        }

        .dragging {
            opacity: 0.4;
            transform: scale(0.95);
        }

        .go-btn i {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .go-btn:hover i {
            transform: rotate(45deg);
        }

        .card-content {
            transition: all 0.3s ease;
        }
        .card:hover .card-content {
            opacity: 0;
            height: 0;
            margin-bottom: 0;
        }
        .card:hover .go-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .tab-item.drag-over {
            border: 2px solid rgb(167 139 250);
            background: rgba(167, 139, 250, 0.2);
            border-radius: 1.5rem;
        }

        .tab-delete {
            display: none;
        }
        .edit-mode .tab-delete {
            display: inline-block !important;
        }

        /* Sticky header */
        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 40;
            background: transparent;
            backdrop-filter: blur(0px);
            padding-top: 1.5rem;
        }

        /* Контейнер для карточек с прокруткой */
        .cards-container {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            padding-bottom: 2rem;
        }

        /* Подсветка поиска */
        mark {
            background: #fbbf24;
            color: #0f172a;
            padding: 0 2px;
            border-radius: 4px;
        }
    </style>
</head>
<body class="text-white">
    <div class="max-w-7xl mx-auto px-6">
        <!-- Sticky header -->
        <div class="sticky-header">
            <div class="flex justify-between items-center mb-6 flex-wrap gap-3">
                <!-- Логотип из static -->
                <img src="{{ url_for('static', filename='logotip.png') }}" alt="Logo" class="max-h-12 w-auto object-contain">

                <!-- Поле поиска с выпадающим списком -->
<div class="flex-1 max-w-md relative">
    <div class="relative">
        <input type="text" id="searchInput" placeholder="Поиск по закладкам..." class="w-full bg-slate-800/80 border border-white/20 rounded-2xl px-5 py-2.5 pr-16 focus:outline-none focus:border-violet-500 text-white">
        <button onclick="clearSearch()" id="clearSearchBtn" class="absolute right-12 top-1/2 -translate-y-1/2 text-white/40 hover:text-white/80 px-2 hidden">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <button onclick="searchBookmarks()" class="absolute right-2 top-1/2 -translate-y-1/2 text-white/60 hover:text-violet-400 px-3 py-1">
            <i class="fa-solid fa-search"></i>
        </button>
    </div>
    <!-- Контейнер для выпадающих результатов -->
    <div id="searchDropdown" class="absolute top-full left-0 right-0 mt-2 bg-slate-900/95 backdrop-blur-sm border border-violet-500/30 rounded-2xl shadow-2xl z-50 hidden max-h-96 overflow-y-auto">
        <div id="searchDropdownResults" class="p-2 space-y-2"></div>
    </div>
</div>

                <!-- Кнопки -->
                <div class="flex gap-2">
                    <div class="relative">
                        <select id="colsSelect" onchange="onColsChange(this.value)"
                            class="appearance-none bg-slate-800/80 border border-white/20 rounded-2xl px-4 py-2.5 pr-8 text-sm text-white focus:outline-none focus:border-violet-500 cursor-pointer">
                            <option value="4">4 в ряд</option>
                            <option value="3">3 в ряд</option>
                            <option value="2">2 в ряд</option>
                            <option value="1">1 в ряд</option>
                         </select>
                        <i class="fa-solid fa-table-columns absolute right-2.5 top-1/2 -translate-y-1/2 text-white/40 pointer-events-none text-xs"></i>
                    </div>
                    <button onclick="addNewTab()" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-2xl flex items-center gap-2 transition-all border border-white/20 text-sm" title="Новая вкладка">
                        <i class="fa-solid fa-plus"></i><span>Новая вкладка</span>
                    </button>
                    <button id="editModeBtn" onclick="toggleEditMode()" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-2xl flex items-center gap-2 transition-all border border-white/20 text-sm" title="Править вкладки">
                        <i class="fa-solid fa-pencil"></i>
                    </button>
                    <button onclick="importFromChrome()" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-2xl flex items-center gap-2 transition-all border border-white/20 text-sm" title="Импорт из Chrome">
                        <i class="fa-brands fa-chrome"></i><span>Импорт из Chrome</span>
                    </button>
                    <button onclick="exportToChrome()" title="Экспорт в Chrome" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-2xl flex items-center gap-2 transition-all border border-white/20 text-sm">
                        <i class="fa-solid fa-arrow-down"></i><i class="fa-brands fa-chrome"></i>
                    </button>
                    <label title="Импорт из JSON" class="px-5 py-2.5 bg-white/10 hover:bg-white/20 backdrop-blur-md rounded-2xl flex items-center gap-2 transition-all border border-white/20 text-sm cursor-pointer">
                        <i class="fa-solid fa-upload"></i>
                        <input type="file" id="importFile" accept=".json" class="hidden" onchange="importData(event)">
                    </label>
                    <button onclick="showAddCardModal()" class="px-5 py-2.5 bg-violet-600 hover:bg-violet-500 rounded-2xl flex items-center gap-2 text-sm" title="Добавить закладку">
                        <i class="fa-solid fa-plus"></i> Добавить
                    </button>
                </div>
            </div>
            <!-- Tabs -->
            <div id="tabs" class="flex border-b border-white/10 mb-4 overflow-x-auto pb-1 gap-1"></div>
        </div>

        <!-- Content (scrollable cards) -->
        <div id="content" class="cards-container"></div>
    </div>

    <!-- Card Modal -->
    <div id="cardModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-8 w-full max-w-md border border-violet-500/30">
            <h2 id="modalTitle" class="text-2xl font-semibold mb-6">Добавить закладку</h2>
            <div class="space-y-6">
                <div><label class="block text-sm text-violet-300 mb-1.5">Название</label><input id="cardTitle" type="text" class="w-full bg-slate-800 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500" placeholder="Название"></div>
                <div><label class="block text-sm text-violet-300 mb-1.5">Описание</label><textarea id="cardDesc" rows="4" class="w-full bg-slate-800 border border-white/20 rounded-3xl px-5 py-4 focus:outline-none focus:border-violet-500 resize-none" placeholder="Описание..."></textarea></div>
                <div><label class="block text-sm text-violet-300 mb-1.5">Ссылка</label><input id="cardUrl" type="text" class="w-full bg-slate-800 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500" placeholder="https://..."></div>
                <div>
                    <label class="block text-sm text-violet-300 mb-1.5">Картинка (URL)</label>
                    <input id="cardImage" type="text" class="w-full bg-slate-800 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500" placeholder="https://...png">
                    <div class="mt-2 text-right">
                        <button type="button" onclick="triggerImageUpload()" class="text-xs text-violet-300 hover:text-violet-200 underline">Загрузить картинку</button>
                    </div>
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeCardModal()" class="flex-1 py-4 bg-white/10 hover:bg-white/15 rounded-2xl">Отмена</button>
                <button onclick="saveCard()" id="saveCardBtn" class="flex-1 py-4 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- Add Tab Modal -->
    <div id="addTabModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-8 w-full max-w-md border border-violet-500/30">
            <h2 class="text-2xl font-semibold mb-6">Новая вкладка</h2>
            <input id="tabName" type="text" class="w-full bg-slate-800 border border-white/20 rounded-2xl px-5 py-4 focus:outline-none focus:border-violet-500" placeholder="Название вкладки">
            <div class="flex gap-4 mt-8">
                <button onclick="closeTabModal()" class="flex-1 py-4 bg-white/10 hover:bg-white/15 rounded-2xl">Отмена</button>
                <button onclick="saveNewTab()" class="flex-1 py-4 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">Создать</button>
            </div>
        </div>
    </div>

    <!-- Search Results Modal -->
    <div id="searchModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-6 w-full max-w-3xl max-h-[80vh] overflow-y-auto border border-violet-500/30">
            <div class="flex justify-between items-center mb-4 sticky top-0 bg-slate-900 pb-2">
                <h2 class="text-2xl font-semibold">Результаты поиска</h2>
                <button onclick="closeSearchModal()" class="text-white/60 hover:text-white text-2xl">&times;</button>
            </div>
            <div id="searchResults" class="space-y-3"></div>
        </div>
    </div>

    <!-- Notification Modal -->
    <div id="notificationModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-8 w-full max-w-md border border-violet-500/30">
            <h2 class="text-2xl font-semibold mb-4" id="notificationTitle">Уведомление</h2>
            <p class="text-white/80 mb-6" id="notificationMessage"></p>
            <div class="flex justify-center">
                <button onclick="closeNotificationModal()" class="px-6 py-3 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">OK</button>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-8 w-full max-w-md border border-violet-500/30">
            <h2 class="text-2xl font-semibold mb-4" id="confirmTitle">Подтверждение</h2>
            <p class="text-white/80 mb-6" id="confirmMessage"></p>
            <div class="flex gap-4">
                <button onclick="confirmNo()" class="flex-1 py-3 bg-white/10 hover:bg-white/15 rounded-2xl">Нет</button>
                <button onclick="confirmYes()" class="flex-1 py-3 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">Да</button>
            </div>
        </div>
    </div>

    <!-- Prompt Modal -->
    <div id="promptModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-8 w-full max-w-md border border-violet-500/30">
            <h2 class="text-2xl font-semibold mb-4" id="promptTitle">Ввод</h2>
            <p class="text-white/80 mb-2" id="promptMessage"></p>
            <input type="text" id="promptInput" class="w-full bg-slate-800 border border-white/20 rounded-2xl px-5 py-3 focus:outline-none focus:border-violet-500 mb-6">
            <div class="flex gap-4">
                <button onclick="promptCancel()" class="flex-1 py-3 bg-white/10 hover:bg-white/15 rounded-2xl">Отмена</button>
                <button onclick="promptOk()" class="flex-1 py-3 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">OK</button>
            </div>
        </div>
    </div>

    <!-- Export to Chrome Modal -->
    <div id="exportChromeModal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-lg flex items-center justify-center z-50">
        <div class="modal bg-slate-900 rounded-3xl p-8 w-full max-w-md border border-violet-500/30">
            <h2 class="text-2xl font-semibold mb-6">Экспорт в Chrome</h2>
            <div class="space-y-4">
                <label class="flex items-center gap-3 cursor-pointer">
                    <input type="checkbox" id="exportFolders" class="w-5 h-5 accent-violet-500 rounded">
                    <span class="text-white/90">Разбивать по папкам (по вкладкам)</span>
                </label>
                <p class="text-white/50 text-sm">Имя закладки = Название + Описание.<br>Порядок вкладок и закладок сохраняется.</p>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeExportChromeModal()" class="flex-1 py-4 bg-white/10 hover:bg-white/15 rounded-2xl">Отмена</button>
                <button onclick="doExportToChrome()" class="flex-1 py-4 bg-violet-600 hover:bg-violet-500 rounded-2xl font-medium">Скачать HTML</button>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
